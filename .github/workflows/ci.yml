name: CI

on:
  push:
    branches: [main]
  pull_request:

# A PR should never be able to leak write access. Day 45 hardens this further and
# pins actions to commit SHAs; tags are acceptable while nothing here can publish.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      # Never cancel the other eight cells because one failed. The whole point of
      # the matrix is finding out WHICH platforms break, not that one did.
      fail-fast: false
      matrix:
        # Windows is not optional here. It is the development machine, and it is
        # the platform most likely to break this specific project: CRLF
        # translation would corrupt the binary .chrono format, path separators
        # differ, file locking is stricter (a real risk for the live tailing in
        # Phase 5), and mmap semantics are not POSIX. If Windows only gets tested
        # by hand, it gets tested rarely and late.
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Format
        run: ruff format --check .

      - name: Types
        run: mypy

      - name: Tests
        run: pytest
